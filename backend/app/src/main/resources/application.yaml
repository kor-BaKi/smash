spring:
  application:
    name: smash
  datasource:
    url: jdbc:mysql://localhost:3306/smash?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

jwt:
  secret: smash-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  access-expiration: 1800000
  refresh-expiration: 1209600000


